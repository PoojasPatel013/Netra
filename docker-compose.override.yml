services:
  # 1. Limit Neo4j Heap (Crucial for 8GB RAM)
  neo4j:
    environment:
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_memory_pagecache_size=256m
    deploy:
      resources:
        limits:
          memory: 1G

  # 2. Disable Data Lake & Heavy ML for Backend
  netra:
    environment:
      - MINIO_ENABLED=false
      - ML_MODE=heuristic
    deploy:
      resources:
        limits:
          memory: 512M

  # 3. Limit Worker & Chrome
  worker:
    environment:
      - MINIO_ENABLED=false
    deploy:
      resources:
        limits:
          memory: 512M

  chrome:
    deploy:
      resources:
        limits:
          memory: 1G

  # 4. Disable MinIO Service entirely to save RAM?
  # Docker Compose doesn't support "disabling" a service in override easily without profiles.
  # But we can set entrypoint to "echo" or just rely on manual `docker compose up --scale minio=0`
  # For now, we just limit its memory drastically if it runs.
  minio:
    deploy:
      resources:
        limits:
          memory: 256M
